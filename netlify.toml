# ─── MindSpace — Netlify Deployment Config ───────────────────────────────────
# TanStack Start / Nitro with the Netlify preset.
# Set these env vars in Netlify Dashboard → Site settings → Environment variables:
#   OLLAMA_API_URL  OLLAMA_API_KEY  OLLAMA_MODEL

[build]
  command = "npm run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"
  # Tell Nitro to build for Netlify (uses @netlify/nitro-netlify preset)
  NITRO_PRESET = "netlify"

# SPA / SSR fallback — TanStack Start handles its own routing
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
